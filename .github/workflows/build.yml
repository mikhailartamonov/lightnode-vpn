name: build-and-publish

on:
  push:
    branches: [main]
    paths:
      - 'vpn-xray/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner (ghcr requires lowercase)
        id: lc
        shell: bash
        run: |
          echo "owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push lightnode-xray
        uses: docker/build-push-action@v5
        with:
          context: ./vpn-xray
          push: true
          tags: |
            ghcr.io/${{ steps.lc.outputs.owner }}/lightnode-xray:latest
            ghcr.io/${{ steps.lc.outputs.owner }}/lightnode-xray:${{ github.sha }}
          build-args: |
            XRAY_UUID=${{ secrets.XRAY_UUID }}
            XRAY_PRIVATE_KEY=${{ secrets.XRAY_PRIVATE_KEY }}
            XRAY_PUBLIC_KEY=${{ secrets.XRAY_PUBLIC_KEY }}
            XRAY_SHORT_ID=${{ secrets.XRAY_SHORT_ID }}
            REALITY_DEST=${{ vars.REALITY_DEST || 'www.cloudflare.com' }}
            REALITY_SNI=${{ vars.REALITY_SNI || vars.REALITY_DEST || 'www.cloudflare.com' }}

  render-windows-setup:
    runs-on: ubuntu-latest
    needs: build
    # Запускается только если в Variables задан PUBLIC_IP (после деплоя)
    if: ${{ vars.PUBLIC_IP != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Render setup-windows.ps1
        env:
          PUBLIC_IP:        ${{ vars.PUBLIC_IP }}
          XRAY_UUID:        ${{ secrets.XRAY_UUID }}
          XRAY_PUBLIC_KEY:  ${{ secrets.XRAY_PUBLIC_KEY }}
          XRAY_SHORT_ID:    ${{ secrets.XRAY_SHORT_ID }}
          REALITY_SNI:      ${{ vars.REALITY_SNI || vars.REALITY_DEST || 'www.cloudflare.com' }}
        run: |
          mkdir -p out
          sed \
            -e "s|__PUBLIC_IP__|${PUBLIC_IP}|g" \
            -e "s|__XRAY_UUID__|${XRAY_UUID}|g" \
            -e "s|__XRAY_PUBLIC_KEY__|${XRAY_PUBLIC_KEY}|g" \
            -e "s|__XRAY_SHORT_ID__|${XRAY_SHORT_ID}|g" \
            -e "s|__REALITY_SNI__|${REALITY_SNI}|g" \
            vpn-xray/setup-windows.ps1.template > out/setup-windows.ps1
          ls -la out/

      - name: Upload setup-windows.ps1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: setup-windows
          path: out/setup-windows.ps1
          retention-days: 30
          if-no-files-found: error
